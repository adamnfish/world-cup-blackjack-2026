name: Deploy Worker

# Deploys the football-data.org CORS proxy to Cloudflare.
# Runs only when the Worker itself changes (it's tiny and rarely does),
# so it stays decoupled from the GitHub Pages deploy.
on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config worker/wrangler.toml
          wranglerVersion: "4.102.0"
